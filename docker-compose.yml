# Continuum NLP — local + GCP demo stack
#
# Container names are prefixed `continuum-nlp-` so this stack can run side-by-side
# with the original Continuum containers (continuum-postgres, etc.).
#
# Host ports are remapped (postgres 5433, redis 6380, neo4j 7475/7688, ollama 11435)
# for the same reason. In-container ports (5432, 6379, 7474, 7687, 11434) are unchanged,
# so service-to-service communication inside the compose network uses default ports.
#
# GPU passthrough: the ollama `deploy.resources.reservations.devices` block is
# commented out because it errors on macOS Docker Desktop (no nvidia runtime).
# On GCP (T4 instance with NVIDIA Container Toolkit installed), uncomment it.

services:
  postgres:
    image: postgres:18-alpine
    container_name: continuum-nlp-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
      POSTGRES_DB: ${POSTGRES_DB:-continuum}
    ports:
      - "127.0.0.1:5433:5432"  # host 5433 → container 5432
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB:-continuum}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  neo4j:
    image: neo4j:2025.01-community
    container_name: continuum-nlp-neo4j
    environment:
      NEO4J_AUTH: ${NEO4J_USER:?NEO4J_USER must be set}/${NEO4J_PASSWORD:?NEO4J_PASSWORD must be set}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_dbms_security_procedures_unrestricted: apoc.*
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
      NEO4J_apoc_import_file_use__neo4j__config: "true"
      # Bumped from 512m/1G — the cypher snapshot restore OOMs at 1 GB heap.
      NEO4J_dbms_memory_heap_initial__size: 2G
      NEO4J_dbms_memory_heap_max__size: 4G
    ports:
      - "127.0.0.1:7475:7474"  # HTTP - host 7475
      - "127.0.0.1:7688:7687"  # Bolt - host 7688
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
      - neo4j_import:/var/lib/neo4j/import
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7.4-alpine
    container_name: continuum-nlp-redis
    ports:
      - "127.0.0.1:6380:6379"  # host 6380 → container 6379
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "$${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:?REDIS_PASSWORD must be set}
    restart: unless-stopped

  ollama:
    image: ollama/ollama:latest
    container_name: continuum-nlp-ollama
    ports:
      - "127.0.0.1:11435:11434"  # host 11435 → container 11434
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=0.0.0.0
    # ── GCP only: uncomment for T4 GPU passthrough ────────────────────────────
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: 1
    #           capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "ollama list > /dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: continuum-nlp-api
    environment:
      # In-compose connection strings use service names + container-internal ports.
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      EMBEDDING_PROVIDER: ${EMBEDDING_PROVIDER:-ollama}
      # Default to the in-compose ollama service; .env can override to host.docker.internal.
      OLLAMA_HOST: ${OLLAMA_HOST:-http://ollama:11434}
      OLLAMA_MODEL: ${OLLAMA_MODEL:-llama3.1:8b}
      OLLAMA_EMBEDDING_MODEL: ${OLLAMA_EMBEDDING_MODEL:-nomic-embed-text}
      EMBEDDING_DIMENSIONS: ${EMBEDDING_DIMENSIONS:-768}
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-continuum}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD}
      REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET must be set}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      DEBUG: ${DEBUG:-false}
    ports:
      - "${API_BIND:-127.0.0.1}:8000:8000"  # set API_BIND=0.0.0.0 for public deploys
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
      ollama:
        condition: service_healthy
    restart: unless-stopped

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    container_name: continuum-nlp-web
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
    ports:
      - "${WEB_BIND:-127.0.0.1}:3000:3000"  # set WEB_BIND=0.0.0.0 for public deploys
    depends_on:
      - api
    restart: unless-stopped

volumes:
  postgres_data:
  neo4j_data:
  neo4j_logs:
  neo4j_import:
  redis_data:
  ollama_data:
